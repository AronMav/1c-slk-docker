;
; LicenceServer config file — Docker-вариант
; Encoding: UTF-8
;
; Расположение в контейнере:
;   /var/1C/licence/3.0/licenceserver.conf
;

[Common]
; Слушаем на всех интерфейсах контейнера
ServerAddr=
; Порт — должен совпадать с портом в docker-compose.yml
ServerPort=9099

; Язык интерфейса (пусто = авто)
Lang=

; Центр лицензирования — используется для активации и обновления ключей
LicenceCenterUrl=http://prom.licencecenter.ru
LicenceCenterUseProxy=0

; Путь к файлу серий лицензий (относительно каталога конфига)
SeriesFile=licence.series

; Логи: не хранить предыдущие сессии (в контейнере логи — stdout)
KeepPreviousLogs=0
KeepCurrentDateLogs=1

[UPKey]
; Аппаратные USB-ключи отключены (используется программный ключ)
Enabled=0

[Console]
; Веб-консоль доступна с любого IP (ограничьте при необходимости)
LocalAccessOnly=0
AllowedAddresses=
; 0 — авторизация только при изменении настроек (по умолчанию)
Authorization=0
; CAPTCHA при системных операциях
CheckCaptcha=1
EnableAccessCodes=0
HideFullStorages=1
HideUnistalled=1
; DNS-rebinding защита — включите, если консоль доступна из интернета
CheckDNSRebinding=0
HostNames=

[API]
; Внешнее API сервера СЛК включено
Enabled=1

[AccessCodes]

[LicenceUpdate]
LastUpdate=
